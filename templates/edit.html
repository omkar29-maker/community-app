<!DOCTYPE html>
<html>
<head>
    <title>Edit Job</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h2>Edit Job</h2>

    <form method="POST">

        <label>Job Title</label><br>
        <input type="text" name="title" value="{{ job[2] }}" required><br><br>

        <label>Location</label><br>
        <input type="text" name="location" value="{{ job[3] }}" required><br><br>

        <label>Contact (WhatsApp Number)</label><br>
        <input type="text" name="contact" value="{{ job[4] }}" required><br><br>

        <label>Salary</label><br>
        <input type="text" name="salary" value="{{ job[5] }}"><br><br>

        <label>Workers Needed</label><br>
        <input type="number" name="workers" value="{{ job[6] }}"><br><br>

        <label>Meals</label><br>
        <input type="text" name="meals" value="{{ job[7] }}"><br><br>

        <label>Description</label><br>
        <textarea name="description">{{ job[8] }}</textarea><br><br>

        <button class="btn" type="submit">💾 Update Job</button>

    </form>

    <br>
    <a class="btn" href="/jobs">⬅ Back</a>

</div>

</body>
</html>
