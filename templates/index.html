<!DOCTYPE html>
<html>
<head>
    <title>Community Help App</title>

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#2b2bff">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">
    <h1>🌍 Community Help App</h1>
    <p>Connecting workers and opportunities</p>

    <br>

    <!-- MAIN BUTTONS -->
    <a class="btn" href="/register">📝 Register</a>
    <a class="btn" href="/login">🔐 Login</a>
    <a class="btn" href="/jobs">💼 View Jobs</a>

    <br><br>

    <!-- SHOW ONLY IF LOGGED IN -->
    {% if 'user' in session %}
        <a class="btn" href="/post">➕ Post Job</a>
        <a class="btn" href="/logout">🚪 Logout</a>
    {% endif %}

    <br><br>

    <!-- EXTRA FEATURES -->
    <a class="btn" href="/contacts">📞 Emergency Contacts</a>

    <br><br>

    <!-- LANGUAGE SECTION (UI ONLY FOR NOW) -->
    <h3>🌐 Language</h3>
    <button class="btn">English</button>
    <button class="btn">हिन्दी</button>
    <button class="btn">मराठी</button>

</div>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
}
</script>

</body>
</html>
