<!DOCTYPE html>
<html>
<head>
    <title>Community Help App</title>

    <!-- ✅ PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">

    <!-- ✅ Mobile settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2b2bff">

    <!-- ✅ Apple support (VERY IMPORTANT) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="CommunityApp">
    <link rel="apple-touch-icon" href="/static/icon.png">

    <!-- ✅ CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">
    <h1>🌍 Community Help App</h1>

    <p>Connecting workers and opportunities</p>

    <br>

    <a class="btn" href="/register">📝 Register</a>
    <a class="btn" href="/login">🔐 Login</a>
    <a class="btn" href="/jobs">💼 View Jobs</a>
</div>

<!-- ✅ Service Worker (Improved) -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('/static/sw.js')
        .then(function(registration) {
            console.log('Service Worker registered with scope:', registration.scope);
        })
        .catch(function(error) {
            console.log('Service Worker registration failed:', error);
        });
    });
}
</script>

</body>
</html>
