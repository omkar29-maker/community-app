<!DOCTYPE html>
<html>
<head>
    <title>{{ t.title }}</title>

    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#111827">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <!-- TOP SECTION -->
    <div class="header">
        <h1>🌍 {{ t.title }}</h1>
        <p class="subtitle">Connecting people with opportunities</p>
    </div>

    <!-- MESSAGE -->
    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}

    <!-- DASHBOARD -->
    <div class="dashboard">

        <a class="card" href="/register">
            📝
            <span>{{ t.register }}</span>
        </a>

        <a class="card" href="/login">
            🔐
            <span>{{ t.login }}</span>
        </a>

        <a class="card" href="/jobs">
            💼
            <span>{{ t.jobs }}</span>
        </a>

        {% if 'user' in session %}
        <a class="card highlight" href="/post">
            ➕
            <span>{{ t.post }}</span>
        </a>

        <a class="card" href="/logout">
            🚪
            <span>{{ t.logout }}</span>
        </a>
        {% endif %}

        <a class="card" href="/contacts">
            📞
            <span>{{ t.contacts }}</span>
        </a>

    </div>

    <!-- LANGUAGE -->
    <div class="language">
        <p>🌐 Language</p>

        <a href="/set_language/en">EN</a>
        <a href="/set_language/hi">हिं</a>
        <a href="/set_language/mr">मर</a>
        <a href="/set_language/kr">한</a>
    </div>

</div>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
}
</script>

</body>
</html>
