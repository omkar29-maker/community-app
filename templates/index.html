<!DOCTYPE html>
<html>
<head>
    <title>{{ t.title }}</title>

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#2b2bff">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <!-- ✅ MESSAGE (CORRECT POSITION) -->
    {% if message %}
        <p style="color: green; font-weight: bold;">{{ message }}</p>
    {% endif %}

    <!-- TITLE -->
    <h1>🌍 {{ t.title }}</h1>

    <p>Connecting workers and opportunities</p>

    <br>

    <!-- MAIN BUTTONS -->
    <a class="btn" href="/register">📝 {{ t.register }}</a>
    <a class="btn" href="/login">🔐 {{ t.login }}</a>
    <a class="btn" href="/jobs">💼 {{ t.jobs }}</a>

    <br><br>

    <!-- SHOW ONLY IF LOGGED IN -->
    {% if 'user' in session %}
        <a class="btn" href="/post">➕ {{ t.post }}</a>
        <a class="btn" href="/logout">🚪 {{ t.logout }}</a>
    {% endif %}

    <br><br>

    <!-- EXTRA FEATURES -->
    <a class="btn" href="/contacts">📞 {{ t.contacts }}</a>

    <br><br>

    <!-- 🌐 LANGUAGE SWITCH -->
    <h3>🌐 Language</h3>

    <a class="btn" href="/set_language/en">English</a>
    <a class="btn" href="/set_language/hi">हिन्दी</a>
    <a class="btn" href="/set_language/mr">मराठी</a>
    <a class="btn" href="/set_language/kr">한국어</a>

</div>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
}
</script>

</body>
</html>
